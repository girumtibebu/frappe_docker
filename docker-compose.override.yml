services:
  backend:
    volumes:
      - ./apps:/home/frappe/frappe-bench/apps
      - ./sites:/home/frappe/frappe-bench/sites
    environment:
      - FRAPPE_DEVELOPER_MODE=1
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
      - "9000:9000"
  frontend:
    ports:
      - "8080:8080"
  db:
    ports:
      - "3306:3306"
